        <rect x="86" y="70" width="1028" height="490" rx="28" fill="none" stroke="#eaf5ec" stroke-width="4"/>
        <line x1="600" y1="70" x2="600" y2="560" stroke="#eaf5ec" stroke-width="4"/>
        <circle cx="600" cy="315" r="72" fill="none" stroke="#eaf5ec" stroke-width="4"/>
        <rect x="86" y="184" width="134" height="260" rx="18" fill="none" stroke="#eaf5ec" stroke-width="4"/>
        <rect x="980" y="184" width="134" height="260" rx="18" fill="none" stroke="#eaf5ec" stroke-width="4"/>
    </g>

    <g filter="url(#shadow)">
