        <text x="98" y="384" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="76" font-weight="900" fill="#16281d">LIGA</text>

        <text x="98" y="438" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#3c5243">Gradovi kao klubovi. Place, najam i standard kao semafor.</text>
        <text x="98" y="479" font-family="Courier New, monospace" font-size="24" font-weight="700" fill="#6b756c">zagreb.lol/usporedbe-gradova</text>

