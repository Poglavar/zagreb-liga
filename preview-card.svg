<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
    <title id="title">Prva gradska liga social preview</title>
    <desc id="desc">Sportski poster s nogometnim terenom, ligaskom tablicom i naslovom Prva gradska liga.</desc>
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0f3b2f"/>
            <stop offset="55%" stop-color="#1d5c45"/>
            <stop offset="100%" stop-color="#2f6f5f"/>
        </linearGradient>
        <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#fff7ea" stop-opacity="0.96"/>
            <stop offset="100%" stop-color="#efe0c0" stop-opacity="0.9"/>
        </linearGradient>
        <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#d76a36"/>
            <stop offset="100%" stop-color="#b8572a"/>
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#0b211a" flood-opacity="0.22"/>
        </filter>
        <pattern id="pitch-stripes" width="180" height="180" patternUnits="userSpaceOnUse" patternTransform="rotate(18)">
            <rect width="180" height="180" fill="none"/>
            <rect width="90" height="180" fill="#ffffff" fill-opacity="0.035"/>
        </pattern>
    </defs>

    <rect width="1200" height="630" fill="url(#bg)"/>
    <rect width="1200" height="630" fill="url(#pitch-stripes)"/>
    <circle cx="1020" cy="118" r="168" fill="#ffffff" fill-opacity="0.06"/>
    <circle cx="146" cy="564" r="188" fill="#d76a36" fill-opacity="0.12"/>

